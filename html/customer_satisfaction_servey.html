<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Form</title>
</head>
<body>

  <h1 id="title">Customer Satisfaction Survey</h1>

  <p id="description">
    Please fill out this short survey to help us improve our services.
  </p>

  <form id="survey-form">

    <label id="name-label" for="name">Name</label>
    <input
      type="text"
      id="name"
      placeholder="Enter your name"
      required
    >

    <br><br>

    <label id="email-label" for="email">Email</label>
    <input
      type="email"
      id="email"
      placeholder="Enter your email"
      required
    >

    <br><br>

    <label id="number-label" for="number">Age</label>
    <input
      type="number"
      id="number"
      min="10"
      max="100"
      placeholder="Enter your age"
    >

    <br><br>

    <label for="dropdown">How did you hear about us?</label>
    <select id="dropdown">
      <option value="internet">Internet</option>
      <option value="friend">Friend</option>
      <option value="social-media">Social Media</option>
    </select>

    <br><br>

    <p>Would you recommend us?</p>

    <input
      type="radio"
      id="yes"
      name="recommend"
      value="yes"
    >
    <label for="yes">Yes</label>

    <input
      type="radio"
      id="no"
      name="recommend"
      value="no"
    >
    <label for="no">No</label>

    <br><br>

    <p>Which features do you like?</p>

    <input
      type="checkbox"
      id="quality"
      value="quality"
    >
    <label for="quality">Quality</label>

    <input
      type="checkbox"
      id="support"
      value="support"
    >
    <label for="support">Customer Support</label>

    <input
      type="checkbox"
      id="pricing"
      value="pricing"
    >
    <label for="pricing">Pricing</label>

    <br><br>

    <label for="comments">Additional Comments</label><br>
    <textarea
      id="comments"
      rows="5"
      cols="40"
      placeholder="Write your comments here..."
    ></textarea>

    <br><br>

    <button id="submit" type="submit">Submit</button>

  </form>

</body>
</html>
